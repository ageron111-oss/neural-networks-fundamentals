type: code
visible: false
score: 50
code:
  - .laborantum/src/datasets/mnist_simple.py
  - .laborantum/src/utils/seed.py
  - .laborantum/src/models/feedforward/deep_batchnorm_net.py
  - .laborantum/src/train_loop.py
  - .laborantum/texts/course/3. Deep Fully Connected NNs/1. Deep Networks,
    Batchnorm and Residual Blocks/task.ipynb
run:
  - jupyter-execute "${relativeTaskPath}/task.ipynb"
  - cd "${relativeTaskPath}/dist"; python task.py
  - mv "${relativeTaskPath}/dist/.answer.json"
    "${relativeTaskPath}/.solution.json"
  - python .laborantum/utils/checker.py -t "${relativeTaskPath}"
  - rm "${relativeTaskPath}/.answer.json"
  - rm "${relativeTaskPath}/.solution.json"
